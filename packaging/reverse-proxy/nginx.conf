worker_processes 1;
error_log stderr notice;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log off;
    client_body_temp_path /tmp/client-body;
    proxy_temp_path /tmp/proxy;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    upstream ttygate_backend {
        server ttygated:7681;
        keepalive 8;
    }

    upstream authentication_backend {
        server auth-gateway:9000;
        keepalive 4;
    }

    server {
        listen 8080;
        server_name terminal.example.invalid;
        return 308 https://$host:8443$request_uri;
    }

    server {
        listen 8443 ssl;
        server_name terminal.example.invalid;

        ssl_certificate /etc/ttygate-proxy/tls/certificate.pem;
        ssl_certificate_key /etc/ttygate-proxy/tls/private-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_tickets off;

        location = /_ttygate_auth {
            internal;
            proxy_pass http://authentication_backend/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Host $http_host;
        }

        location / {
            auth_request /_ttygate_auth;
            auth_request_set $authenticated_identity $upstream_http_x_authenticated_user;

            proxy_pass http://ttygate_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header Authorization "";
            proxy_set_header X-Authenticated-User $authenticated_identity;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 14500s;
            proxy_send_timeout 30s;
            proxy_buffering off;
        }
    }
}
